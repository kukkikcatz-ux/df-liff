<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สแกนรับงาน - Duroform</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f8;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  h2 { color: #06C755; margin: 0 0 8px; }
  p.sub { color: #666; font-size: 14px; margin: 0 0 20px; }
  .spinner {
    border: 4px solid #eee;
    border-top: 4px solid #06C755;
    border-radius: 50%;
    width: 40px; height: 40px;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { 100% { transform: rotate(360deg); } }
  .error { color: #e0393e; font-size: 14px; margin-top: 12px; }
  button {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    border-radius: 8px;
    border: none;
    background: #06C755;
    color: #fff;
    font-weight: bold;
    margin-top: 12px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="card" id="mainCard" style="display:none">
  <div class="spinner" id="spinner"></div>
  <h2 id="statusTitle">กำลังเปิดกล้อง...</h2>
  <p class="sub" id="statusSub">รอสักครู่</p>
  <div id="errorBox" style="display:none">
    <div class="error" id="errorMsg"></div>
    <button onclick="startScan()">ลองสแกนอีกครั้ง</button>
  </div>
</div>

<script>
const LIFF_ID = '2010616002-UrFVlH3n';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxGOZbDoN3xz7cvjtrDOk0k9Zxp9CDyldvAue8WkfhvXgmimOze2SGCmsnfn6_5EyGBaA/exec';

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('statusTitle').textContent = 'ไม่สำเร็จ';
  document.getElementById('statusSub').textContent = '';
  document.getElementById('errorBox').style.display = 'block';
  document.getElementById('errorMsg').textContent = msg;
}

function startScan() {
  document.getElementById('mainCard').style.display = 'block';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('statusTitle').textContent = 'กำลังเปิดกล้อง...';
  document.getElementById('statusSub').textContent = 'รอสักครู่';
  document.getElementById('errorBox').style.display = 'none';

  liff.init({ liffId: LIFF_ID }).then(() => {
    if (!liff.isInClient()) {
      showError('กรุณาเปิดผ่านแอพ LINE เท่านั้นครับ');
      return;
    }
    if (typeof liff.scanCodeV2 !== 'function') {
      showError('กรุณาอัปเดตแอพ LINE เป็นเวอร์ชันล่าสุดครับ');
      return;
    }
    liff.scanCodeV2().then(function(result) {
      const scanned = result && result.value ? result.value : '';
      if (!scanned) { showError('สแกนไม่สำเร็จ ลองใหม่อีกครั้งครับ'); return; }

      let jobId = '';
      try {
        const u = new URL(scanned);
        jobId = u.searchParams.get('jobId') || '';
      } catch(e) {
        const m = scanned.match(/[?&]jobId=([^&]+)/);
        jobId = m ? decodeURIComponent(m[1]) : '';
      }
      if (!jobId) {
        showError('QR ไม่ใช่ของระบบนี้ กรุณาสแกน QR ที่ติดอยู่หน้างานเท่านั้นครับ');
        return;
      }

      document.getElementById('statusTitle').textContent = 'สแกนสำเร็จ';
      document.getElementById('statusSub').textContent = 'กำลังเข้าสู่ระบบ...';
      window.location.href = GAS_URL + '?jobId=' + encodeURIComponent(jobId) + '&autoLogin=tech';
    }).catch(function(err) {
      if (err && err.code === 'CANCEL') {
        showError('ยกเลิกการสแกน');
      } else {
        showError('สแกนไม่สำเร็จ: ' + (err && err.message ? err.message : 'ลองใหม่อีกครั้งครับ'));
      }
    });
  }).catch(function() {
    showError('เชื่อมต่อ LINE ไม่สำเร็จ ลองเปิดใหม่อีกครั้งครับ');
  });
}

// 🆕 LINE ห่อ query string ไว้ใน "liff.state" ถ้า endpoint เป็นเว็บนอก (ไม่ใช่ liff.line.me เอง)
// ต้องแกะค่าจริงออกมาก่อนเช็ค action — ไม่งั้น action=scanqr จะไม่มีทางเจอเลย เพราะมันถูกห่ออยู่ข้างใน
function getEffectiveParams_() {
  const raw = new URLSearchParams(window.location.search);
  if (raw.has('liff.state')) {
    const state = decodeURIComponent(raw.get('liff.state'));
    const qIndex = state.indexOf('?');
    const qs = qIndex >= 0 ? state.slice(qIndex + 1) : state;
    return new URLSearchParams(qs);
  }
  return raw;
}

// 🆕 เช็คก่อนว่าเปิดมาจากปุ่ม "สแกนรับงาน" (มี action=scanqr ไม่ว่าจะอยู่ตรงๆ หรือห่อใน liff.state)
// หรือปุ่มอื่น (เช่น "งานของฉัน") — ถ้าไม่ใช่การสแกน ให้ redirect เข้าระบบหลักทันที ไม่โชว์การ์ดกล้องเลย
const effectiveParams = getEffectiveParams_();
if (effectiveParams.get('action') === 'scanqr') {
  startScan();
} else {
  window.location.href = GAS_URL;
}
</script>

</body>
</html>
